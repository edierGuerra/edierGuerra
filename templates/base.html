<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edier Guerra - {%block title%}{%endblock%}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{url_for('static', filename= 'css/body.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename= 'css/header.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename= 'css/navbar.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename= 'css/aside.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename= 'css/buttons.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename= 'css/index-main.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename= 'css/modal.css')}}">


</head>
<body>
    <header>
      <div class="header-img"><img class="header-img" src="/static/assets/Rectangle 7.png" alt=""></div>
      <div class="header-img"><img class="header-img" src="/static/assets/Rectangle 8.png" alt=""></div>
    </header>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid nav">
          <a class="navbar-brand" href="#">EG</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link" href="#">Sobre mi</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Proyectos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Contactame</a>
              </li>
            </ul>
          </div>
        </div>
    </nav>
    <div class="container-fluid row main-container">
        <aside class="col aside">
            {%block aside1%}{%endblock%}
        </aside>
        <main class="col">
            {%block content%}{%endblock%}
        </main>
        <aside class="col aside">
            {%block aside2%}{%endblock%}
        </aside>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
